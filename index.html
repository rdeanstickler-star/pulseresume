<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="PulseResume — privacy-first, open-source resume builder. Real-time editor, dual HTML/PDF render, no accounts, your data never leaves your browser."
    />
    <meta name="theme-color" content="#0f172a" />
    <title>PulseResume — Privacy-first resume builder</title>
    <!--
      Google Fonts CDN — the ONE allowed network call (documented in privacy
      section of README). Preconnects keep TTFB minimal; the css?family= URL
      pulls just the families the customization panel exposes.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lato:wght@400;700&family=Roboto:wght@400;700&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Source+Serif+Pro:wght@400;700&family=Playfair+Display:wght@400;700&family=EB+Garamond:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
